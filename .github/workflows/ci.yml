name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  BUILD_TYPE: Release

jobs:
  native-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure CMake debug build
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build # Equivalent to `ninja -C build`

      - name: Verify binaries
        run: |
          ls -la build/bin/
          file build/bin/lens

      - name: Test lens on itself
        run: |
          # lens can parse any ELF - test it on the compiler
          build/bin/lens /usr/bin/ls || true

  arm32-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            gcc-arm-linux-gnueabi g++-arm-linux-gnueabi \
            libc6-dev-armel-cross qemu-user

      - name: Configure CMake for ARM32
        run: |
          cmake -B build-arm32 -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=arm \
            -DCMAKE_C_COMPILER=arm-linux-gnueabi-gcc \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-march=armv7-a -marm"

      - name: Build ARM32
        run: cmake --build build-arm32

      - name: Verify ARM32 binaries
        run: |
          file build-arm32/bin/lens
          arm-linux-gnueabi-readelf -h build-arm32/bin/lens

      - name: Create test ARM binary
        run: |
          echo 'int main() { return 42; }' > /tmp/test.c
          arm-linux-gnueabi-gcc -march=armv7-a -marm -o /tmp/test_arm /tmp/test.c
          file /tmp/test_arm

      - name: Test lens on ARM binary (via QEMU)
        run: |
          qemu-arm -L /usr/arm-linux-gnueabi build-arm32/bin/lens /tmp/test_arm

      - name: Run lens test suite
        run: |
          cd build-arm32
          ctest --output-on-failure -j$(nproc) # Parallel

  arm64-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross qemu-user

      - name: Configure CMake for ARM64
        run: |
          cmake -B build-arm64 -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build ARM64
        run: cmake --build build-arm64

      - name: Verify ARM64 binaries
        run: |
          file build-arm64/bin/lens
          aarch64-linux-gnu-readelf -h build-arm64/bin/lens

      - name: Create test ARM64 binary
        run: |
          echo 'int main() { return 42; }' > /tmp/test.c
          aarch64-linux-gnu-gcc -o /tmp/test_arm64 /tmp/test.c
          file /tmp/test_arm64

      - name: Test lens on ARM64 binary (via QEMU)
        run: |
          qemu-aarch64 -L /usr/aarch64-linux-gnu build-arm64/bin/lens /tmp/test_arm64

      - name: Run lens ARM64 test suite
        run: |
          cd build-arm64
          ctest --output-on-failure -j$(nproc)

  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tools

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=constVariablePointer \
            --suppress=constParameterPointer \
            src/

      - name: Run clang static analyser
        run: |
          scan-build cmake -B build-scan -G "Unix Makefiles"
          scan-build --status-bugs cmake --build build-scan
